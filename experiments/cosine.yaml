model_name: bert-base-uncased
pooling: mean
experiment_name: cosine

loss:
  type: cosine

training:
  batch_size: 64
  lr: 2e-5
  epochs: 3
  warmup_steps: 100
  gradient_accumulation_steps: 1
  fp16: true
  max_grad_norm: 1.0
  early_stopping_patience: 3
  max_train_samples: null

learning_rates:
  - 1.0e-5
  - 2.0e-5
  - 3.0e-5
  - 5.0e-5

output_dir: outputs
seed: 42
