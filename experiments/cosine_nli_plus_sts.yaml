# Two-stage training:
# Stage 1: NLI corpus (SNLI + MNLI) with CosineSimilarityLoss, label-derived scores
# Stage 2: STS train split fine-tuning with human similarity annotations
# Validation on STS dev. Final eval on STS test (held out).

model_name: bert-base-uncased
pooling: mean
experiment_name: cosine_nli_plus_sts
training_mode: nli_plus_sts

loss:
  type: cosine

training:
  batch_size: 64
  lr: 2e-5
  epochs: 10
  sts_finetune_epochs: 2
  warmup_steps: 100
  gradient_accumulation_steps: 1
  fp16: true
  max_grad_norm: 1.0
  early_stopping_patience: 3
  max_train_samples: null

learning_rates:
  - 1.0e-5
  - 2.0e-5
  - 3.0e-5
  - 5.0e-5

output_dir: outputs
seed: 42
